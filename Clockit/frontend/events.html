<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clockit - Browse Events</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav id="main-nav"></nav>
 
  <main>
    <h2 class="section-title" data-i18n="nav_events">Browse Events</h2>
 
    <div class="filters-bar">
      <input type="text" id="search-input" data-i18n="search_placeholder" placeholder="Search events..." oninput="onSearchOrFilter()">
      <select id="filter-category" onchange="onSearchOrFilter()">
        <option value="" data-i18n="filter_all">All</option>
      </select>
      <select id="filter-city" onchange="onSearchOrFilter()">
        <option value="" data-i18n="filter_all">All</option>
      </select>
      <select id="sort-select" onchange="onSearchOrFilter()">
        <option value="date_asc" data-i18n="sort_date_asc">Date (soonest)</option>
        <option value="date_desc" data-i18n="sort_date_desc">Date (latest)</option>
        <option value="title_asc" data-i18n="sort_title_asc">Title (A-Z)</option>
        <option value="title_desc" data-i18n="sort_title_desc">Title (Z-A)</option>
      </select>
    </div>
 
    <div class="events-grid" id="events-grid">
      <p data-i18n="loading">Loading...</p>
    </div>
 
    <div class="pagination" id="pagination"></div>
  </main>
 
  <footer id="main-footer"></footer>
  <div id="toast-container"></div>
 
  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/events.js"></script>
  <script>
    initPage().then(() => loadEvents());
  </script>
</body>
</html>
