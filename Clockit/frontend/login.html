<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clockit - Login</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav id="main-nav"></nav>
 
  <main>
    <div class="auth-container">
      <div class="auth-card" id="login-card">
        <h2 data-i18n="login_title">Login</h2>
        <form id="login-form">
          <div class="form-group">
            <label data-i18n="email">Email</label>
            <input type="email" id="login-email" required>
          </div>
          <div class="form-group">
            <label data-i18n="password">Password</label>
            <input type="password" id="login-password" required>
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="btn_login">Login</button>
        </form>
        <div class="auth-switch">
          <a href="#" onclick="showRegister(); return false;" data-i18n="switch_to_register">Don't have an account? Register</a>
        </div>
      </div>
 
      <div class="auth-card" id="register-card" style="display:none">
        <h2 data-i18n="register_title">Create Account</h2>
        <form id="register-form">
          <div class="form-group">
            <label data-i18n="display_name">Display Name</label>
            <input type="text" id="register-name" required>
          </div>
          <div class="form-group">
            <label data-i18n="email">Email</label>
            <input type="email" id="register-email" required>
          </div>
          <div class="form-group">
            <label data-i18n="password">Password</label>
            <input type="password" id="register-password" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="btn_register">Register</button>
        </form>
        <div class="auth-switch">
          <a href="#" onclick="showLogin(); return false;" data-i18n="switch_to_login">Already have an account? Login</a>
        </div>
      </div>
    </div>
  </main>
 
  <footer id="main-footer"></footer>
  <div id="toast-container"></div>
 
  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/cart.js"></script>
  <script>
    function showLogin() {
      document.getElementById('login-card').style.display = '';
      document.getElementById('register-card').style.display = 'none';
      window.i18n.translatePage();
    }
    function showRegister() {
      document.getElementById('login-card').style.display = 'none';
      document.getElementById('register-card').style.display = '';
      window.i18n.translatePage();
    }
 
    initPage().then(() => {
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          const res = await window.api.apiPost('/auth/login', {
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value,
          });
          localStorage.setItem('clockit_token', res.access_token);
          showToast(window.i18n.t('login_success'));
          setTimeout(() => window.location.href = '/', 800);
        } catch (err) {
          showToast(err.message, 'error');
        }
      });
 
      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          const res = await window.api.apiPost('/auth/register', {
            display_name: document.getElementById('register-name').value,
            email: document.getElementById('register-email').value,
            password: document.getElementById('register-password').value,
          });
          localStorage.setItem('clockit_token', res.access_token);
          showToast(window.i18n.t('register_success'));
          setTimeout(() => window.location.href = '/', 800);
        } catch (err) {
          showToast(err.message, 'error');
        }
      });
    });
  </script>
</body>
</html>
