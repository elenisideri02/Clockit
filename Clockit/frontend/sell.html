<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clockit - Sell Tickets</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav id="main-nav"></nav>
 
  <main>
    <div class="sell-container">
      <div class="sell-card">
        <h2 data-i18n="create_listing">Sell a Ticket</h2>
        <form id="sell-form">
          <div class="form-group">
            <label data-i18n="select_event">Select Event</label>
            <select id="sell-event" required>
              <option value="">--</option>
            </select>
          </div>
          <div class="form-group">
            <label data-i18n="ticket_type">Ticket Type</label>
            <input type="text" id="sell-ticket-type" placeholder="e.g. VIP, General Admission">
          </div>
          <div class="form-group">
            <label data-i18n="section">Section</label>
            <input type="text" id="sell-section" placeholder="e.g. A, Balcony">
          </div>
          <div class="form-group">
            <label data-i18n="row">Row</label>
            <input type="text" id="sell-row" placeholder="e.g. 1, A">
          </div>
          <div class="form-group">
            <label data-i18n="seat">Seat</label>
            <input type="text" id="sell-seat" placeholder="e.g. 15">
          </div>
          <div class="form-group">
            <label data-i18n="listing_qty">Number of Tickets</label>
            <input type="number" id="sell-qty" min="1" value="1" required>
          </div>
          <div class="form-group">
            <label data-i18n="listing_price">Price per Ticket (EUR)</label>
            <input type="number" id="sell-price" min="0.01" step="0.01" required>
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="submit_listing">Create Listing</button>
        </form>
      </div>
    </div>
  </main>
 
  <footer id="main-footer"></footer>
  <div id="toast-container"></div>
 
  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/sell.js"></script>
  <script>
    initPage().then(() => initSellPage());
  </script>
</body>
</html>
